name: Build Windows app

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build portable executable
        shell: pwsh
        run: ./build.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: VirtualKeyboard-Windows
          path: dist/VirtualKeyboard.exe
          if-no-files-found: error

      - name: Publish tagged GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag dist/VirtualKeyboard.exe --clobber
          } else {
            gh release create $tag dist/VirtualKeyboard.exe --generate-notes --title "Virtual Keyboard $tag"
          }
